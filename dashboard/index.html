<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <title>Calories</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="switcher" aria-label="Select person">
          <button class="switch-button" type="button" data-user="arun">Arun</button>
          <button class="switch-button" type="button" data-user="ishita">Ishita</button>
        </div>
      </header>

      <section class="hero">
        <div>
          <p class="eyebrow">Today</p>
          <h1 id="calories">-</h1>
          <p id="updated" class="muted">Loading dashboard...</p>
        </div>
        <button id="refresh" type="button">Refresh</button>
      </section>

      <section class="grid two">
        <article class="card">
          <span class="label">Protein</span>
          <strong id="protein">-</strong>
        </article>
        <article class="card">
          <span class="label">Alcohol/Junk</span>
          <strong id="alcoholJunk">-</strong>
        </article>
      </section>

      <section class="card">
        <div class="section-title">
          <h2>Last 7 days</h2>
          <span id="range7" class="muted"></span>
        </div>
        <div class="trend-head">
          <span>Calories</span>
          <span>Protein</span>
        </div>
        <div id="trend" class="trend"></div>
      </section>

      <section class="card">
        <div class="section-title">
          <h2>Today's entries</h2>
        </div>
        <div id="entries" class="entries"></div>
      </section>

      <section id="setup" class="setup hidden">
        <h2>User selected</h2>
        <p>
          Open this dashboard with <code>?user=arun</code>. The user will be
          saved on this device for quick future opens.
        </p>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
